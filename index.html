<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo ガント</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f2;
      --panel: #ffffff;
      --text: #1e2520;
      --muted: #647069;
      --line: #dfe5df;
      --todo: #3c78d8;
      --todo-soft: #e9f1ff;
      --doing: #d7851d;
      --doing-soft: #fff1d9;
      --done: #23885f;
      --done-soft: #e5f4ec;
      --danger: #b2413b;
      --shadow: 0 16px 44px rgba(31, 43, 35, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .summary {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--todo);
    }

    .dot.doing {
      background: var(--doing);
    }

    .dot.done {
      background: var(--done);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    form {
      display: grid;
      grid-template-columns: minmax(180px, 1.5fr) minmax(120px, 0.8fr) minmax(140px, 1fr) minmax(140px, 1fr) auto;
      gap: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(35, 136, 95, 0.23);
      outline-offset: 2px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    .add {
      align-self: end;
      background: var(--done);
      color: white;
    }

    .add:hover {
      background: #1b6f4d;
    }

    .chart {
      overflow-x: auto;
    }

    .chart-grid {
      min-width: 760px;
    }

    .chart-grid.is-empty {
      min-width: 0;
    }

    .chart-header,
    .task {
      display: grid;
      grid-template-columns: 190px repeat(var(--days), minmax(42px, 1fr)) 92px;
    }

    .chart-header {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f9faf7;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .corner,
    .day,
    .task-info,
    .task-actions {
      padding: 10px;
    }

    .day {
      min-height: 42px;
      border-left: 1px solid var(--line);
      text-align: center;
    }

    .day.today {
      color: var(--done);
      background: var(--done-soft);
    }

    .task {
      position: relative;
      min-height: 72px;
      border-top: 1px solid var(--line);
    }

    .task:first-of-type {
      border-top: 0;
    }

    .task.done .task-name {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-info {
      display: grid;
      gap: 8px;
      align-content: center;
      background: var(--panel);
      z-index: 1;
    }

    .task-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 800;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .status.todo {
      background: var(--todo-soft);
      color: var(--todo);
    }

    .status.doing {
      background: var(--doing-soft);
      color: var(--doing);
    }

    .status.done {
      background: var(--done-soft);
      color: var(--done);
    }

    .cell {
      border-left: 1px solid var(--line);
      background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.025), rgba(0, 0, 0, 0.025));
      background-size: 100% 1px;
      background-repeat: no-repeat;
      background-position: 0 50%;
    }

    .bar {
      align-self: center;
      height: 26px;
      margin: 0 4px;
      border-radius: 999px;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 0.78rem;
      font-weight: 800;
      overflow: hidden;
      white-space: nowrap;
      z-index: 1;
    }

    .bar.todo {
      background: var(--todo);
    }

    .bar.doing {
      background: var(--doing);
    }

    .bar.done {
      background: var(--done);
    }

    .task-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--panel);
      z-index: 1;
    }

    .icon-button {
      width: 38px;
      min-width: 38px;
      min-height: 38px;
      padding: 0;
      background: #eef4f2;
      color: #196b50;
    }

    .icon-button:hover {
      background: #dcebe7;
    }

    .delete {
      background: #f8e9e7;
      color: var(--danger);
    }

    .delete:hover {
      background: #efd1ce;
    }

    .empty {
      padding: 30px 16px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .app {
        padding: 16px 12px 28px;
      }

      header {
        display: block;
      }

      h1 {
        font-size: 1.7rem;
      }

      .legend {
        justify-content: flex-start;
        margin-top: 12px;
      }

      form {
        grid-template-columns: 1fr;
      }

      .chart-grid {
        min-width: 700px;
      }

      .chart-header,
      .task {
        grid-template-columns: 168px repeat(var(--days), minmax(38px, 1fr)) 86px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Todo</h1>
        <p class="summary" id="summary">0件のタスク</p>
      </div>
      <div class="legend" aria-label="状態ごとの色">
        <span class="legend-item"><span class="dot"></span>未着手</span>
        <span class="legend-item"><span class="dot doing"></span>着手中</span>
        <span class="legend-item"><span class="dot done"></span>完了</span>
      </div>
    </header>

    <form class="panel" id="task-form">
      <label>
        タスク名
        <input id="task-name" name="name" type="text" placeholder="タスク名" autocomplete="off" required>
      </label>
      <label>
        状態
        <select id="task-status" name="status" aria-label="状態">
          <option value="todo">未着手</option>
          <option value="doing">着手中</option>
          <option value="done">完了</option>
        </select>
      </label>
      <label>
        開始日
        <input id="task-start" name="start" type="date" required>
      </label>
      <label>
        期限
        <input id="task-end" name="end" type="date" required>
      </label>
      <button class="add" type="submit">追加</button>
    </form>

    <section class="panel chart" aria-label="タスクのガントチャート">
      <div class="chart-grid" id="chart"></div>
    </section>
  </main>

  <script>
    const storageKey = "personal-todo-app-tasks";
    const statusLabels = {
      todo: "未着手",
      doing: "着手中",
      done: "完了"
    };

    const form = document.querySelector("#task-form");
    const nameInput = document.querySelector("#task-name");
    const statusInput = document.querySelector("#task-status");
    const startInput = document.querySelector("#task-start");
    const endInput = document.querySelector("#task-end");
    const chartEl = document.querySelector("#chart");
    const summaryEl = document.querySelector("#summary");

    let tasks = loadTasks();

    function toDate(value) {
      const date = new Date(`${value}T00:00:00`);
      return Number.isNaN(date.getTime()) ? new Date() : date;
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(date, amount) {
      const next = new Date(date);
      next.setDate(next.getDate() + amount);
      return next;
    }

    function daysBetween(start, end) {
      const dayMs = 24 * 60 * 60 * 1000;
      return Math.round((toDate(end) - toDate(start)) / dayMs);
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function loadTasks() {
      const today = formatDate(new Date());
      const fallbackEnd = formatDate(addDays(new Date(), 2));
      const saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
      return saved.map((task) => ({
        ...task,
        start: task.start || today,
        end: task.end || fallbackEnd
      }));
    }

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(tasks));
    }

    function setDefaultDates() {
      const today = new Date();
      startInput.value = formatDate(today);
      endInput.value = formatDate(addDays(today, 6));
    }

    function getTimeline() {
      const today = formatDate(new Date());
      const dates = tasks.flatMap((task) => [task.start, task.end]);
      dates.push(today);

      const minDate = dates.reduce((min, date) => toDate(date) < toDate(min) ? date : min, dates[0]);
      const maxDate = dates.reduce((max, date) => toDate(date) > toDate(max) ? date : max, dates[0]);
      const totalDays = Math.max(7, daysBetween(minDate, maxDate) + 1);
      const start = toDate(minDate);

      return Array.from({ length: totalDays }, (_, index) => formatDate(addDays(start, index)));
    }

    function renderHeader(timeline) {
      const today = formatDate(new Date());
      return `
        <div class="chart-header" style="--days: ${timeline.length}">
          <div class="corner">タスク</div>
          ${timeline.map((date) => `
            <div class="day ${date === today ? "today" : ""}">
              ${toDate(date).getMonth() + 1}/${toDate(date).getDate()}
            </div>
          `).join("")}
          <div class="corner">操作</div>
        </div>
      `;
    }

    function renderTask(task, timeline) {
      const startIndex = Math.max(0, timeline.indexOf(task.start));
      const endIndex = Math.max(startIndex, timeline.indexOf(task.end));
      const span = endIndex - startIndex + 1;
      const cells = timeline.map((date) => `<div class="cell" data-date="${date}"></div>`).join("");

      return `
        <article class="task ${task.status === "done" ? "done" : ""}" data-id="${task.id}" style="--days: ${timeline.length}">
          <div class="task-info">
            <div class="task-name">${escapeHtml(task.name)}</div>
            <div class="meta">
              <span class="status ${task.status}">${statusLabels[task.status]}</span>
              <span>${task.start} - ${task.end}</span>
            </div>
          </div>
          ${cells}
          <div class="bar ${task.status}" style="grid-column: ${startIndex + 2} / span ${span}">
            ${statusLabels[task.status]}
          </div>
          <div class="task-actions">
            <button class="icon-button complete" type="button" title="完了にする" aria-label="完了にする">✓</button>
            <button class="icon-button delete" type="button" title="削除" aria-label="削除">×</button>
          </div>
        </article>
      `;
    }

    function render() {
      const unfinished = tasks.filter((task) => task.status !== "done").length;
      summaryEl.textContent = `${tasks.length}件のタスク / 未完了 ${unfinished}件`;

      if (tasks.length === 0) {
        chartEl.classList.add("is-empty");
        chartEl.innerHTML = '<div class="empty">タスクはまだありません</div>';
        return;
      }

      chartEl.classList.remove("is-empty");
      const timeline = getTimeline();
      chartEl.innerHTML = renderHeader(timeline) + tasks.map((task) => renderTask(task, timeline)).join("");
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = nameInput.value.trim();
      if (!name) return;

      const start = startInput.value;
      const end = endInput.value < start ? start : endInput.value;

      tasks.unshift({
        id: crypto.randomUUID(),
        name,
        status: statusInput.value,
        start,
        end
      });

      save();
      render();
      form.reset();
      setDefaultDates();
      nameInput.focus();
    });

    chartEl.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      const taskEl = event.target.closest(".task");
      if (!button || !taskEl) return;

      const id = taskEl.dataset.id;

      if (button.classList.contains("complete")) {
        tasks = tasks.map((task) => task.id === id ? { ...task, status: "done" } : task);
      }

      if (button.classList.contains("delete")) {
        tasks = tasks.filter((task) => task.id !== id);
      }

      save();
      render();
    });

    setDefaultDates();
    render();
  </script>
</body>
</html>
